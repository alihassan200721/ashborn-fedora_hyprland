# Monitor
monitor=,preferred,auto,1

# Programs
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun

# Autostart
exec-once = waybar
exec-once = nm-applet
exec-once = blueman-applet
exec-once = polkit-gnome-authentication-agent-1

# Environment
env = XCURSOR_SIZE,24

# Input
input {
    kb_layout = us
    follow_mouse = 1
}

# General
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    layout = dwindle
}

# Decoration
decoration {
    rounding = 8
}

# Animations
animations {
    enabled = yes
}

# Keybinds
$mainMod = SUPER

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, Q, killactive
bind = $mainMod, E, exec, dolphin
bind = $mainMod, F, fullscreen

# Apps shortcuts
bind = $mainMod, B, exec, firefox
bind = $mainMod, V, exec, code
bind = $mainMod, O, exec, obs
bind = $mainMod, N, exec, blender

# Workspace switching
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move window
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2

# Screenshot
bind = , PRINT, exec, grim -g "$(slurp)" - | wl-copy

# Power menu
bind = $mainMod SHIFT, E, exec, wlogout
bind = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bind = ,XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bind = ,XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = ,XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

exec-once = swww-daemon
exec-once = swww img /home/ashborn/Pictures/firefoxwallpaper.png

# Minimize/unminimize (toggle)
bind = SUPER, M, togglespecialworkspace, minimized
bind = SUPER SHIFT, M, movetoworkspacesilent, special:minimized

